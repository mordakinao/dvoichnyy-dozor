<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Двоичный дозор - Информатика 7-9 класс</title>
    <style>
        /* ========== СТИЛИ ========== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a2a3f 100%);
            color: #00ffaa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(15, 26, 47, 0.95);
            border: 3px solid #00ffaa;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0, 255, 170, 0.4);
        }
        
        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #00ffaa;
            color: #fff;
        }
        
        .subtitle {
            text-align: center;
            color: #aaddcc;
            margin-bottom: 20px;
            font-size: 1.2rem;
            border-bottom: 2px dashed #00ffaa;
            padding-bottom: 10px;
        }
        
        /* ========== КНОПКА ЗВУКА ========== */
        #soundButton {
            background: #332200;
            border: 3px solid #ffaa00;
            border-radius: 60px;
            padding: 15px 25px;
            margin-bottom: 25px;
            text-align: center;
            color: #ffaa00;
            font-weight: bold;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        #soundButton:hover {
            background: #443300;
            transform: scale(1.02);
        }
        
        #soundButton.active {
            background: #00aa44;
            border-color: #00ffaa;
            color: white;
        }
        
        /* Статистика */
        .stats-panel {
            display: flex;
            justify-content: space-around;
            background: #0f1a2f;
            border: 2px solid #00ffaa;
            border-radius: 50px;
            padding: 15px;
            margin-bottom: 25px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-label {
            color: #88ccbb;
            font-size: 0.9rem;
        }
        
        .stat-value {
            font-size: 2rem;
            color: #fff;
            font-weight: bold;
        }
        
        /* Режимы */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .mode-card {
            background: #0f1a2f;
            border: 2px solid #2a4a5a;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            color: #aaddcc;
            font-weight: bold;
        }
        
        .mode-card.active {
            border-color: #00ffaa;
            background: #1a3a4a;
            color: #fff;
        }
        
        /* Задание */
        .task-panel {
            background: #0f1a2f;
            border: 3px solid #00ffaa;
            border-radius: 30px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
        }
        
        .task-main {
            font-size: 2rem;
            color: #fff;
            margin: 15px 0;
        }
        
        /* Биты */
        .bits-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .bit {
            flex: 1 1 80px;
            min-width: 80px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f1a2f;
            border: 3px solid #2a4a5a;
            border-radius: 15px;
            font-size: 2rem;
            cursor: pointer;
            color: #aaddcc;
        }
        
        .bit.active {
            background: #00ffaa;
            border-color: #fff;
            color: #0a1a2a;
        }
        
        /* Кнопки */
        .control-panel {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-check {
            background: #00ffaa;
            color: #0a1a2a;
        }
        
        .btn-hint {
            background: #1a2a3f;
            color: #00ffaa;
            border: 2px solid #00ffaa;
        }
        
        /* Статус */
        .status {
            padding: 15px;
            text-align: center;
            font-size: 1.3rem;
            border-radius: 50px;
            background: #0f1a2f;
            border: 2px solid #2a4a5a;
            margin-bottom: 15px;
        }
        
        .status.success {
            background: #4CAF50;
            color: white;
        }
        
        .status.error {
            background: #f44336;
            color: white;
        }
        
        .keyboard-hint {
            background: #1a2a3f;
            border: 2px solid #00ffaa;
            border-radius: 40px;
            padding: 12px;
            text-align: center;
            color: #aaddcc;
        }
        
        .key {
            background: #0a1a2a;
            border: 2px solid #00ffaa;
            border-radius: 8px;
            padding: 3px 10px;
            margin: 0 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ ДВОИЧНЫЙ ДОЗОР ⚡</h1>
        <div class="subtitle">информатика 7-9 классы</div>
        
        <!-- КНОПКА ЗВУКА -->
        <div id="soundButton">🔊 НАЖМИ СЮДА, ЧТОБЫ ВКЛЮЧИТЬ ЗВУК</div>
        
        <!-- Статистика -->
        <div class="stats-panel">
            <div class="stat-item"><span class="stat-label">ОЧКИ</span><br><span class="stat-value" id="score">0</span></div>
            <div class="stat-item"><span class="stat-label">УРОВЕНЬ</span><br><span class="stat-value" id="level">1</span></div>
            <div class="stat-item"><span class="stat-label">РЕШЕНО</span><br><span class="stat-value" id="solved">0</span></div>
        </div>
        
        <!-- Режимы -->
        <div class="mode-grid">
            <div class="mode-card active" onclick="setMode('binary7', this)">7 класс: Двоичная система</div>
            <div class="mode-card" onclick="setMode('logic8', this)">8 класс: Логика</div>
            <div class="mode-card" onclick="setMode('oge9', this)">9 класс: ОГЭ</div>
        </div>
        
        <!-- Задание -->
        <div class="task-panel">
            <div id="taskMain">Переведи 156 в двоичную систему</div>
            <div class="task-hint" id="taskHint">Нажми на биты 1-8</div>
        </div>
        
        <!-- Биты -->
        <div class="bits-container" id="bitsContainer"></div>
        
        <!-- Кнопки -->
        <div class="control-panel">
            <button class="btn btn-check" id="checkBtn">ПРОВЕРИТЬ</button>
            <button class="btn btn-hint" id="hintBtn">ПОДСКАЗКА</button>
            <button class="btn btn-hint" id="newTaskBtn">НОВОЕ</button>
        </div>
        
        <!-- Статус -->
        <div class="status" id="statusMessage">Нажимай биты 1-8</div>
        
        <!-- Подсказка по клавиатуре -->
        <div class="keyboard-hint">
            <span><span class="key">1-8</span> биты</span>
            <span><span class="key">Пробел</span> проверить</span>
            <span><span class="key">Enter</span> новое</span>
            <span><span class="key">H</span> подсказка</span>
        </div>
    </div>

    <script>
        // =============== НАСТРОЙКИ ===============
        const bitValues = [128, 64, 32, 16, 8, 4, 2, 1];
        let activeBits = [false, false, false, false, false, false, false, false];
        let currentMode = 'binary7';
        let score = 0;
        let level = 1;
        let solved = 0;
        let currentAnswer = 156;
        
        // =============== ЗВУК (ПРОСТАЯ И НАДЁЖНАЯ ВЕРСИЯ) ===============
        let soundEnabled = false;
        
        function playSound(type) {
            if (!soundEnabled) return;
            
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                // Пробуждаем контекст (важно для Chrome)
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                // Разные звуки
                if (type === 'click') {
                    osc.frequency.value = 400;
                    gain.gain.value = 0.1;
                    osc.start();
                    osc.stop(0.1);
                } else if (type === 'success') {
                    osc.frequency.value = 600;
                    gain.gain.value = 0.1;
                    osc.start();
                    osc.stop(0.2);
                } else if (type === 'error') {
                    osc.frequency.value = 200;
                    gain.gain.value = 0.1;
                    osc.start();
                    osc.stop(0.3);
                }
            } catch(e) {
                console.log('Ошибка звука:', e);
            }
        }
        
        // КНОПКА ВКЛЮЧЕНИЯ ЗВУКА
        document.getElementById('soundButton').onclick = function() {
            soundEnabled = true;
            this.classList.add('active');
            this.innerHTML = '🔊 ЗВУК ВКЛЮЧЁН';
            
            // Тестовый звук
            setTimeout(() => {
                playSound('success');
            }, 100);
        };
        
        // =============== БИТЫ ===============
        function createBits() {
            const container = document.getElementById('bitsContainer');
            for (let i = 0; i < 8; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                bit.dataset.index = i;
                bit.innerHTML = bitValues[i];
                
                bit.onclick = function() {
                    const idx = parseInt(this.dataset.index);
                    activeBits[idx] = !activeBits[idx];
                    this.classList.toggle('active');
                    
                    // Звук при клике
                    playSound('click');
                    
                    // Показываем сумму
                    updateSum();
                };
                
                container.appendChild(bit);
            }
        }
        
        function getSum() {
            let sum = 0;
            for (let i = 0; i < 8; i++) {
                if (activeBits[i]) sum += bitValues[i];
            }
            return sum;
        }
        
        function updateSum() {
            document.getElementById('statusMessage').innerHTML = `Текущая сумма: ${getSum()}`;
        }
        
        function resetBits() {
            activeBits.fill(false);
            document.querySelectorAll('.bit').forEach(b => b.classList.remove('active'));
        }
        
        // =============== ЗАДАНИЯ ===============
        const tasks = {
            binary7: [
                {q: "Переведи 156 в двоичную систему", a: 156, hint: "128 + 16 + 8 + 4"},
                {q: "Переведи 199 в двоичную систему", a: 199, hint: "128 + 64 + 4 + 2 + 1"},
                {q: "Переведи 211 в двоичную систему", a: 211, hint: "128 + 64 + 16 + 2 + 1"},
                {q: "Переведи 255 в двоичную систему", a: 255, hint: "все биты включены"}
            ],
            logic8: [
                {q: "A=1, B=0, найти A∧B (И)", a: 0, hint: "1 И 0 = 0"},
                {q: "A=1, B=0, найти A∨B (ИЛИ)", a: 1, hint: "1 ИЛИ 0 = 1"},
                {q: "A=1, найти ¬A (НЕ)", a: 0, hint: "НЕ 1 = 0"}
            ],
            oge9: [
                {q: "Сколько бит в слове 'ИНФОРМАТИКА'?", a: 88, hint: "11 букв × 8 = 88"},
                {q: "Сколько байт в слове 'КОМПЬЮТЕР'?", a: 9, hint: "9 букв = 9 байт"},
                {q: "Сколько бит в 2 Кбайтах?", a: 16384, hint: "2×1024×8 = 16384"}
            ]
        };
        
        function newTask() {
            const modeTasks = tasks[currentMode];
            const task = modeTasks[Math.floor(Math.random() * modeTasks.length)];
            
            document.getElementById('taskMain').innerHTML = task.q;
            currentAnswer = task.a;
            
            if (task.hint) {
                document.getElementById('taskHint').innerHTML = task.hint;
            } else {
                document.getElementById('taskHint').innerHTML = 'Нажми на биты 1-8';
            }
            
            resetBits();
            updateSum();
        }
        
        // =============== ПРОВЕРКА ===============
        function checkTask() {
            const sum = getSum();
            
            if (sum === currentAnswer) {
                score += 10;
                solved++;
                if (solved % 5 === 0) level++;
                
                document.getElementById('score').innerHTML = score;
                document.getElementById('level').innerHTML = level;
                document.getElementById('solved').innerHTML = solved;
                document.getElementById('statusMessage').innerHTML = '✅ ПРАВИЛЬНО!';
                document.getElementById('statusMessage').className = 'status success';
                
                playSound('success');
                setTimeout(newTask, 1500);
            } else {
                document.getElementById('statusMessage').innerHTML = `❌ ОШИБКА! Правильный ответ: ${currentAnswer}`;
                document.getElementById('statusMessage').className = 'status error';
                playSound('error');
            }
        }
        
        // =============== ПОДСКАЗКА ===============
        function showHint() {
            const task = tasks[currentMode].find(t => t.a === currentAnswer);
            if (task && task.hint) {
                document.getElementById('taskHint').innerHTML = task.hint;
            }
        }
        
        // =============== СМЕНА РЕЖИМА ===============
        function setMode(mode, element) {
            currentMode = mode;
            
            document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            
            newTask();
        }
        
        // =============== КЛАВИАТУРА ===============
        document.onkeydown = function(e) {
            const key = e.key;
            
            if (key >= '1' && key <= '8') {
                const idx = parseInt(key) - 1;
                const bit = document.querySelectorAll('.bit')[idx];
                bit.click();
                e.preventDefault();
            }
            
            if (key === ' ') {
                document.getElementById('checkBtn').click();
                e.preventDefault();
            }
            
            if (key === 'Enter') {
                document.getElementById('newTaskBtn').click();
                e.preventDefault();
            }
            
            if (key === 'h' || key === 'H') {
                document.getElementById('hintBtn').click();
                e.preventDefault();
            }
        };
        
        // =============== ЗАПУСК ===============
        createBits();
        newTask();
        
        document.getElementById('checkBtn').onclick = checkTask;
        document.getElementById('hintBtn').onclick = showHint;
        document.getElementById('newTaskBtn').onclick = newTask;
    </script>
</body>
</html>
