<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Двоичный дозор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #0a1a2a;
            color: #00ffaa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            background: #0f1a2f;
            border: 3px solid #00ffaa;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 30px #00ffaa;
        }
        
        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 30px;
            color: #fff;
            text-shadow: 0 0 15px #00ffaa;
        }
        
        /* КНОПКА ЗВУКА - САМАЯ ГЛАВНАЯ */
        .sound-section {
            text-align: center;
            margin-bottom: 30px;
        }
        
        #soundBtn {
            background: #ffaa00;
            border: none;
            border-radius: 60px;
            padding: 20px 40px;
            font-size: 2rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 30px #ffaa00;
            border: 3px solid white;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        
        #soundBtn:hover {
            background: #ffbb22;
            transform: scale(1.02);
        }
        
        #soundBtn.active {
            background: #00ffaa;
            box-shadow: 0 0 30px #00ffaa;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            background: #1a2a3f;
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }
        
        .task {
            background: #1a2a3f;
            border: 3px solid #00ffaa;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .task-text {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 20px;
        }
        
        .bits {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .bit {
            width: 100px;
            height: 120px;
            background: #1a2a3f;
            border: 3px solid #2a4a5a;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #0a1a2a;
        }
        
        .bit.active {
            background: #00ffaa;
            border-color: #fff;
            color: #000;
            box-shadow: 0 0 30px #00ffaa;
        }
        
        .bit small {
            font-size: 0.9rem;
            opacity: 0.7;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: #1a2a3f;
            color: #00ffaa;
            border: 2px solid #00ffaa;
        }
        
        .btn-check {
            background: #00ffaa;
            color: #000;
        }
        
        .status {
            background: #1a2a3f;
            border-radius: 30px;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        
        .hint {
            background: #332200;
            color: #ffaa00;
            padding: 15px;
            border-radius: 30px;
            text-align: center;
            font-size: 1.3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ ДВОИЧНЫЙ ДОЗОР ⚡</h1>
        
        <!-- КНОПКА ЗВУКА - ОГРОМНАЯ, ПЕРВАЯ, ВИДНАЯ -->
        <div class="sound-section">
            <button id="soundBtn">🔊 НАЖМИ СЮДА, ЧТОБЫ ВКЛЮЧИТЬ ЗВУК</button>
        </div>
        
        <!-- Статистика -->
        <div class="stats">
            <div>ОЧКИ: <span id="score">0</span></div>
            <div>УРОВЕНЬ: <span id="level">1</span></div>
            <div>РЕШЕНО: <span id="solved">0</span></div>
        </div>
        
        <!-- Задание -->
        <div class="task">
            <div class="task-text" id="task">Переведи число в двоичную систему</div>
            <div class="task-text" style="font-size: 4rem;" id="target">156</div>
        </div>
        
        <!-- Биты -->
        <div class="bits" id="bits"></div>
        
        <!-- Кнопки -->
        <div class="buttons">
            <button class="btn btn-check" id="checkBtn">ПРОВЕРИТЬ</button>
            <button class="btn" id="newBtn">НОВОЕ</button>
        </div>
        
        <!-- Статус -->
        <div class="status" id="status">Сумма: 0</div>
        
        <!-- Подсказка (без ответа) -->
        <div class="hint" id="hint">Нажми на биты 1-8</div>
    </div>

    <script>
        // =============== НАСТРОЙКИ ===============
        const bitValues = [128, 64, 32, 16, 8, 4, 2, 1];
        let activeBits = [false, false, false, false, false, false, false, false];
        let score = 0;
        let level = 1;
        let solved = 0;
        let currentAnswer = 156;
        
        // =============== ЗВУК - САМАЯ ПРОСТАЯ ВЕРСИЯ ===============
        let soundEnabled = false;
        
        // Функция звука
        function playBeep(type) {
            if (!soundEnabled) return;
            
            try {
                // Создаём новый контекст для каждого звука (так надёжнее)
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                // Пробуждаем
                if (ctx.state === 'suspended') {
                    ctx.resume();
                }
                
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                // Настройки звука
                if (type === 'click') {
                    osc.frequency.value = 400;
                    gain.gain.value = 0.1;
                } else if (type === 'success') {
                    osc.frequency.value = 600;
                    gain.gain.value = 0.1;
                } else if (type === 'error') {
                    osc.frequency.value = 200;
                    gain.gain.value = 0.1;
                }
                
                osc.start();
                osc.stop(0.1);
                
                // Для успеха - добавим второй звук
                if (type === 'success') {
                    setTimeout(() => {
                        if (!soundEnabled) return;
                        const ctx2 = new AudioContext();
                        const osc2 = ctx2.createOscillator();
                        const gain2 = ctx2.createGain();
                        osc2.connect(gain2);
                        gain2.connect(ctx2.destination);
                        osc2.frequency.value = 800;
                        gain2.gain.value = 0.1;
                        osc2.start();
                        osc2.stop(0.1);
                    }, 150);
                }
            } catch(e) {
                console.log('Звук не поддерживается');
            }
        }
        
        // КНОПКА ВКЛЮЧЕНИЯ ЗВУКА
        document.getElementById('soundBtn').onclick = function() {
            soundEnabled = true;
            this.classList.add('active');
            this.innerHTML = '🔊 ЗВУК ВКЛЮЧЁН';
            
            // Три тестовых звука
            playBeep('click');
            setTimeout(() => playBeep('success'), 200);
            setTimeout(() => playBeep('error'), 500);
        };
        
        // =============== БИТЫ ===============
        function createBits() {
            const bitsDiv = document.getElementById('bits');
            for (let i = 0; i < 8; i++) {
                const bit = document.createElement('div');
                bit.className = 'bit';
                bit.dataset.index = i;
                bit.innerHTML = `${bitValues[i]}<br><small>${i+1}</small>`;
                
                bit.onclick = function() {
                    const idx = parseInt(this.dataset.index);
                    activeBits[idx] = !activeBits[idx];
                    this.classList.toggle('active');
                    
                    playBeep('click'); // Звук при клике
                    
                    const sum = getSum();
                    document.getElementById('status').innerHTML = `Сумма: ${sum}`;
                };
                
                bitsDiv.appendChild(bit);
            }
        }
        
        function getSum() {
            let sum = 0;
            for (let i = 0; i < 8; i++) {
                if (activeBits[i]) sum += bitValues[i];
            }
            return sum;
        }
        
        function resetBits() {
            activeBits.fill(false);
            document.querySelectorAll('.bit').forEach(b => b.classList.remove('active'));
            document.getElementById('status').innerHTML = 'Сумма: 0';
        }
        
        // =============== ЗАДАНИЯ ===============
        const tasks = [
            {q: "156", a: 156, hint: "128 + 16 + 8 + 4"},
            {q: "199", a: 199, hint: "128 + 64 + 4 + 2 + 1"},
            {q: "211", a: 211, hint: "128 + 64 + 16 + 2 + 1"},
            {q: "255", a: 255, hint: "все биты включены"},
            {q: "101101₂", a: 45, hint: "32 + 8 + 4 + 1"},
            {q: "110011₂", a: 51, hint: "32 + 16 + 2 + 1"},
            {q: "111111₂", a: 63, hint: "32 + 16 + 8 + 4 + 2 + 1"},
            {q: "101010₂", a: 42, hint: "32 + 8 + 2"}
        ];
        
        function newTask() {
            const task = tasks[Math.floor(Math.random() * tasks.length)];
            document.getElementById('target').innerHTML = task.q;
            currentAnswer = task.a;
            document.getElementById('hint').innerHTML = task.hint;
            resetBits();
        }
        
        // =============== ПРОВЕРКА ===============
        function check() {
            const sum = getSum();
            
            if (sum === currentAnswer) {
                score += 10;
                solved++;
                if (solved % 5 === 0) level++;
                
                document.getElementById('score').innerHTML = score;
                document.getElementById('level').innerHTML = level;
                document.getElementById('solved').innerHTML = solved;
                document.getElementById('status').innerHTML = '✅ ПРАВИЛЬНО! +10 очков';
                
                playBeep('success'); // Звук успеха
                
                setTimeout(newTask, 1500);
            } else {
                document.getElementById('status').innerHTML = `❌ ОШИБКА! Правильный ответ: ${currentAnswer}`;
                playBeep('error'); // Звук ошибки
            }
        }
        
        // =============== КЛАВИАТУРА ===============
        document.onkeydown = function(e) {
            const key = e.key;
            
            if (key >= '1' && key <= '8') {
                const idx = parseInt(key) - 1;
                document.querySelectorAll('.bit')[idx].click();
                e.preventDefault();
            }
            
            if (key === ' ') {
                check();
                e.preventDefault();
            }
            
            if (key === 'Enter') {
                newTask();
                e.preventDefault();
            }
        };
        
        // =============== ЗАПУСК ===============
        createBits();
        newTask();
        
        document.getElementById('checkBtn').onclick = check;
        document.getElementById('newBtn').onclick = newTask;
    </script>
</body>
</html>
